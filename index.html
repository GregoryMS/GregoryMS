<!DOCTYPE html>
<html lang="en">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/favicons/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicons/favicon.svg" />
  <link rel="shortcut icon" href="/favicons/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/favicons/apple-touch-icon.png" />
  <link rel="manifest" href="/favicons/site.webmanifest" />

  <title>Gregle</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel-strong: #ffffff;
      --text: #0b1726;
      --muted: #5c6b7a;
      --border: rgba(0,0,0,0.08);
      --shadow: 0 10px 30px rgba(0,0,0,0.06);
      --accent: #222;
      --accent-hover: #000;
      --button-secondary: rgba(0,0,0,0.04);
      --ticker-hover: rgba(187,25,25,0.08);
    }

    body.dark-mode {
      --bg: #242424;
      --panel-strong: #2c2c2c;
      --text: #f1f1f1;
      --muted: #b5b5b5;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 10px 30px rgba(0,0,0,0.5);
      --accent: #444;
      --accent-hover: #666;
      --button-secondary: rgba(255,255,255,0.08);
      --ticker-hover: rgba(255,255,255,0.08);
    }

    * {
      box-sizing: border-box;
    }

    html {
      color-scheme: light;
    }

    html.dark-mode {
      color-scheme: dark;
    }

    a, button, input, .ticker-wrap, .menu-panel, .search-input, .weather-chip, .utc-chip {
      transition: background 0.25s ease, color 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease, transform 0.18s ease;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
      background-repeat: no-repeat;
      background-size: cover;
      transition: background 0.35s ease, color 0.35s ease;
    }

    body {
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      min-height: 100vh;
    }

    html.dark-mode,
    html.dark-mode body {
      background: #242424;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 22px 0;
      gap: 12px;
      flex-wrap: wrap;
    }

    .left-tools,
    .nav-tools {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .left-tools {
      justify-content: flex-start;
    }

    .nav-tools {
      justify-content: flex-end;
      margin-left: auto;
    }

    .menu-wrap {
      position: relative;
    }

    .menu-button,
    .login-button,
    .quick-link,
    .search-button {
      border: 1px solid var(--border);
      background: var(--panel-strong);
      color: var(--text);
      border-radius: 999px;
      height: 42px;
      padding: 0 16px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.2s ease;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: var(--shadow-soft);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .menu-button:hover,
    .login-button:hover,
    .quick-link:hover,
    .search-button:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow);
      border-color: rgba(0,0,0,0.08);
    }

    .menu-button {
      min-width: 42px;
      padding: 0 14px;
      font-weight: 600;
    }

    .menu-panel {
      position: absolute;
      top: 52px;
      right: 0;
      width: 240px;
      background: color-mix(in srgb, var(--panel-strong) 96%, transparent);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 10px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      display: none;
      z-index: 10;
    }

    .menu-panel.open {
      display: block;
    }

    .menu-title {
      font-size: 0.8rem;
      color: var(--muted);
      padding: 8px 10px 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .menu-link {
      display: block;
      padding: 12px 14px;
      border-radius: 14px;
      color: var(--text);
      text-decoration: none;
      font-size: 0.96rem;
    }

    .menu-link:hover {
      background: rgba(0, 0, 0, 0.06);
      color: var(--text);
    }

    body.dark-mode .menu-link:hover {
      background: rgba(255, 255, 255, 0.12);
      color: var(--text);
    }

    .utc-chip,
    .weather-chip {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--border);
      background: var(--panel-strong);
      border-radius: 999px;
      padding: 0 14px;
      font-size: 0.92rem;
      color: var(--muted);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      white-space: nowrap;
      text-decoration: none;
    }

    .weather-chip strong,
    .utc-chip strong {
      color: var(--text);
      font-weight: 600;
    }

    .ticker-wrap {
      width: min(92vw, 980px);
      margin: 18px auto 0;
      border: 1px solid rgba(16, 24, 40, 0.08);
      border-radius: 22px;
      background: color-mix(in srgb, var(--panel-strong) 96%, transparent);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      align-items: center;
      min-height: 56px;
      z-index: 5;
    }

    .ticker-label {
      flex: 0 0 auto;
      padding: 0 14px;
      min-height: 56px;
      display: flex;
      align-items: center;
      background: color-mix(in srgb, var(--panel-strong) 98%, transparent);
      border-right: 1px solid var(--border);
    }

    .bbc-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      text-decoration: none;
    }

    .bbc-badge:hover {
      opacity: 0.85;
    }
    
    .bbc-blocks {
      display: inline-flex;
      gap: 2px;
    }

    .bbc-block {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      background: linear-gradient(180deg, #d82929, #bb1919);
      color: #ffffff;
      font-size: 0.72rem;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.14);
      font-weight: 800;
      letter-spacing: 0.02em;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .bbc-text {
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #bb1919;
    }

    .ticker {
      position: relative;
      overflow: hidden;
      width: 100%;
      min-height: 56px;
      display: flex;
      align-items: center;
      mask-image: linear-gradient(to right, transparent 0, black 4%, black 96%, transparent 100%);
      -webkit-mask-image: linear-gradient(to right, transparent 0, black 4%, black 96%, transparent 100%);
    }

    .ticker-track {
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
      will-change: transform;
      transform: translateX(0);
    }

    .ticker-group {
      display: inline-flex;
      align-items: center;
      flex: 0 0 auto;
    }

    .ticker-item {
      display: inline-flex;
      align-items: center;
      margin-right: 18px;
      color: var(--text);
      text-decoration: none;
      font-size: 0.96rem;
      padding: 8px 12px;
      border-radius: 999px;
      transition: background 0.18s ease, color 0.18s ease, transform 0.18s ease;
      flex: 0 0 auto;
    }

    .ticker-item:hover {
      background: var(--ticker-hover);
      color: #bb1919;
      transform: translateY(-1px);
    }

    .ticker-sep {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #98a2b3;
      margin-right: 18px;
      font-size: 0.95rem;
      flex: 0 0 auto;
      user-select: none;
    }

    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 0;
      padding-top: 14vh; /* ~Google vertical alignment */
      padding-bottom: 40px;
      text-align: center;
    }

    .quick-links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin: 0 0 24px;
    }

    .brand {
      font-family: 'Montserrat', sans-serif !important;
      font-size: clamp(3.8rem, 8vw, 6.2rem);
      font-weight: 300;
      letter-spacing: -0.02em;
      margin: 0 0 36px;
      line-height: 1;
      cursor: pointer;
      user-select: none;
      text-align: center;
      transition: transform 0.2s ease, opacity 0.2s ease;
      font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .brand:hover {
      transform: translateY(-1px);
      opacity: 0.9;
    }

    .brand:hover {
      transform: translateY(-1px);
      opacity: 0.9;
    }

    .brand:hover {
      transform: translateY(-1px);
      opacity: 0.9;
    }

    .logo-main {
      color: var(--text);
      font-weight: 300;
      letter-spacing: -0.015em;
      font-family: 'Montserrat', sans-serif;
    }

    .brand:hover {
      transform: translateY(-1px);
      opacity: 0.96;
    }

    

    .search-shell {
      width: min(92vw, 720px);
      display: flex;
      flex-direction: column;
      gap: 18px;
      align-items: center;
    }

    .search-form {
      width: 100%;
      position: relative;
    }

    .search-input {
      width: 100%;
      height: 64px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--panel-strong) 98%, transparent);
      padding: 0 24px;
      font-size: 1.05rem;
      color: var(--text);
      box-shadow: var(--shadow);
      caret-color: var(--text);
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .search-input:focus {
      border-color: rgba(0,0,0,0.08);
      box-shadow: 0 18px 60px rgba(0,0,0,0.08);
      transform: translateY(-1px);
    }

    .button-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .search-button {
      min-width: 156px;
      height: 46px;
      padding: 0 20px;
      font-weight: 600;
      border-radius: 999px;
    }

    .search-button.default {

      background: #222;
      color: #fff;
      border-color: transparent;
    }

    .search-button.default:hover {
      background: var(--accent-hover);
    }

    .search-button.secondary {
      background: var(--button-secondary);
    }

    .quick-link {
      background: color-mix(in srgb, var(--panel-strong) 90%, transparent);
    }



    .search-form {
      position: relative;
    }

    .autocomplete-list {
      position: absolute;
      top: calc(100% + 10px);
      left: 0;
      right: 0;
      margin: 0;
      padding: 8px;
      list-style: none;
      border: 1px solid var(--border);
      border-radius: 22px;
      background: color-mix(in srgb, var(--panel-strong) 98%, transparent);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      display: none;
      z-index: 20;
      max-height: 280px;
      overflow-y: auto;
    }

    .autocomplete-list.open {
      display: block;
    }

    .autocomplete-item {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--text);
      text-align: left;
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 0.98rem;
      cursor: pointer;
      display: block;
    }

    .autocomplete-item:hover,
    .autocomplete-item.active {
      background: rgba(0, 0, 0, 0.06);
    }

    body.dark-mode .autocomplete-item:hover,
    body.dark-mode .autocomplete-item.active {
      background: rgba(255, 255, 255, 0.12);
    }


    @media (max-width: 720px) {
      .nav-tools {
        flex-wrap: nowrap;
        min-width: 0;
      }

      .mail-link {
        display: none;
      }
    }

    @media (max-width: 800px) {
      .topbar {
        padding: 14px 12px 0;
      }

      .ticker-wrap {
        width: min(94vw, 980px);
        margin: 14px auto 0;
      }

      .ticker-label {
        padding: 0 10px;
      }

      .bbc-text {
        display: none;
      }

      .hero {
        min-height: 0;
        padding-top: 12vh;
        padding-bottom: 8vh;
      }
    }
  </style>
</head>
<body>

  <div class="ticker-wrap" aria-label="BBC headlines ticker">
    <div class="ticker-label">
      <a href="https://www.bbc.co.uk/news" target="_blank" rel="noreferrer" class="bbc-badge">

    <span class="bbc-block">B</span>

  </div>

    <div class="ticker">
      <div class="ticker-track" id="tickerTrack">
        <div class="ticker-group" id="tickerGroup">
          <span class="ticker-item">Loading headlines…</span>
        </div>
      </div>
    </div>
  </div>

  <main class="hero">
    <h1 class="brand" id="brandToggle" title="Toggle dark mode"><span class="logo-main">Gregle</span></h1>

    <div class="search-shell">
      <form class="search-form" id="searchForm">
        <input
          class="search-input"
          id="searchInput"
          type="text"
          placeholder="Search the web"
          autocomplete="off"
          spellcheck="false"
          autocapitalize="off"
          autocorrect="off"
          aria-label="Search query"
        />
<ul class="autocomplete-list" id="autocompleteList" role="listbox" aria-label="Search suggestions"></ul>
      </form>

      <div class="button-row">
        <button class="search-button default" id="gregleSearch" type="button">Search Gregle</button>
        <button class="search-button secondary" id="braveSearch" type="button">Search Brave</button>
      </div>
    </div>
  </main>

  <script>
    const searchInput = document.getElementById('searchInput');
    const gregleSearchButton = document.getElementById('gregleSearch');
    const braveSearchButton = document.getElementById('braveSearch');
    const searchForm = document.getElementById('searchForm');
    const autocompleteList = document.getElementById('autocompleteList');
    const weatherChip = document.getElementById('weatherChip');
    const utcClock = document.getElementById('utcClock');
    const tickerTrack = document.getElementById('tickerTrack');
    const menuToggle = document.getElementById('menuToggle');
    const menuPanel = document.getElementById('menuPanel');
    const brandToggle = document.getElementById('brandToggle');

    let activeSuggestionIndex = -1;
    let suggestionItems = [];
    let autocompleteTimer = null;
    let autocompleteRequestSeq = 0;

    function getRecentSearches() {
      try {
        return JSON.parse(localStorage.getItem('gregle-recent-searches') || '[]');
      } catch {
        return [];
      }
    }

    function saveRecentSearch(query) {
      const cleaned = query.trim();
      if (!cleaned) return;
      const current = getRecentSearches().filter(item => item.toLowerCase() !== cleaned.toLowerCase());
      current.unshift(cleaned);
      const trimmed = current.slice(0, 8);
      try {
        localStorage.setItem('gregle-recent-searches', JSON.stringify(trimmed));
      } catch {}
    }

    function applyTheme(theme) {
      const isDark = theme === 'dark';
      document.body.classList.toggle('dark-mode', isDark);
      document.documentElement.classList.toggle('dark-mode', isDark);
      try {
        localStorage.setItem('gregle-theme', isDark ? 'dark' : 'light');
      } catch {}
    }

    function initTheme() {
      let savedTheme = null;
      try {
        savedTheme = localStorage.getItem('gregle-theme');
      } catch {}

      if (savedTheme === 'dark' || savedTheme === 'light') {
        applyTheme(savedTheme);
        return;
      }

      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      applyTheme(prefersDark ? 'dark' : 'light');
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function getLocalSuggestions(query) {
      const q = query.trim().toLowerCase();
      const pool = [...getRecentSearches()];
      const unique = [];

      for (const item of pool) {
        const value = String(item || '').trim();
        if (!value) continue;
        if (q && !value.toLowerCase().includes(q)) continue;
        if (!unique.some(existing => existing.toLowerCase() === value.toLowerCase())) {
          unique.push(value);
        }
      }

      return unique.slice(0, 8);
    }

    function updateDatalist(items) {
      return;
    }

    function closeAutocomplete() {
      autocompleteRequestSeq++;
      clearTimeout(autocompleteTimer);
      autocompleteList.classList.remove('open');
      autocompleteList.innerHTML = '';
      suggestionItems = [];
      activeSuggestionIndex = -1;
    }

    function renderSuggestionList(items) {
      suggestionItems = items.slice(0, 8);
      updateDatalist(suggestionItems);

      if (!suggestionItems.length) {
        closeAutocomplete();
        return;
      }

      autocompleteList.innerHTML = suggestionItems.map((item, index) => `
        <li role="option" aria-selected="${index === activeSuggestionIndex}">
          <button class="autocomplete-item ${index === activeSuggestionIndex ? 'active' : ''}" type="button" data-index="${index}">${escapeHtml(item)}</button>
        </li>
      `).join('');

      autocompleteList.classList.add('open');

      autocompleteList.querySelectorAll('.autocomplete-item').forEach((button, index) => {
        button.addEventListener('mousedown', (event) => {
          event.preventDefault();
          searchInput.value = suggestionItems[index];
          activeSuggestionIndex = -1;
          closeAutocomplete();
        });

        button.addEventListener('mouseenter', () => {
          activeSuggestionIndex = index;
          autocompleteList.querySelectorAll('.autocomplete-item').forEach((itemEl, itemIndex) => {
            itemEl.classList.toggle('active', itemIndex === activeSuggestionIndex);
          });
        });
      });
    }

    function fetchDuckDuckGoSuggestions(query) {
      return new Promise((resolve, reject) => {
        const callbackName = `gregleAutocomplete_${Date.now()}_${Math.floor(Math.random() * 100000)}`;
        const script = document.createElement('script');
        let finished = false;

        const timeoutId = setTimeout(() => {
          if (finished) return;
          finished = true;
          cleanup();
          reject(new Error('Autocomplete timeout'));
        }, 3000);

        function cleanup() {
          clearTimeout(timeoutId);
          if (script.parentNode) script.parentNode.removeChild(script);
          try {
            delete window[callbackName];
          } catch {}
        }

        window[callbackName] = (data) => {
          if (finished) return;
          finished = true;
          cleanup();
          if (!Array.isArray(data)) {
            resolve([]);
            return;
          }
          resolve(
            data
              .map(item => item && (item.phrase || item.text || item.value || ''))
              .filter(Boolean)
          );
        };

        script.onerror = () => {
          if (finished) return;
          finished = true;
          cleanup();
          reject(new Error('Autocomplete request failed'));
        };

        script.async = true;
        script.src = `https://duckduckgo.com/ac/?q=${encodeURIComponent(query)}&callback=${callbackName}`;
        document.head.appendChild(script);
      });
    }

    async function renderSuggestions(query = '') {
      const trimmed = query.trim();
      const seq = ++autocompleteRequestSeq;

      if (trimmed.length < 1) {
        updateDatalist([]);
        closeAutocomplete();
        return;
      }

      try {
        const remote = await fetchDuckDuckGoSuggestions(trimmed);
        if (seq !== autocompleteRequestSeq) return;

        const combined = [...remote, ...getLocalSuggestions(trimmed)];
        const unique = [];
        for (const item of combined) {
          const value = String(item || '').trim();
          if (!value) continue;
          if (!unique.some(existing => existing.toLowerCase() === value.toLowerCase())) {
            unique.push(value);
          }
        }

        activeSuggestionIndex = -1;
        renderSuggestionList(unique.slice(0, 8));
      } catch {
        if (seq !== autocompleteRequestSeq) return;
        activeSuggestionIndex = -1;
        const local = getLocalSuggestions(trimmed);
        if (local.length) {
          renderSuggestionList(local);
        } else {
          closeAutocomplete();
        }
      }
    }

    function queueSuggestions() {
      clearTimeout(autocompleteTimer);
      autocompleteTimer = setTimeout(() => {
        renderSuggestions(searchInput.value);
      }, 120);
    }

    function getQuery() {
      return searchInput.value.trim();
    }

    function runSearch(baseUrl) {
      const query = getQuery();
      if (!query) {
        searchInput.focus();
        return;
      }
      saveRecentSearch(query);
      closeAutocomplete();
      window.location.href = `${baseUrl}${encodeURIComponent(query)}`;
    }

    gregleSearchButton.addEventListener('click', () => {
      runSearch('https://gregle.de/search?q=');
    });

    braveSearchButton.addEventListener('click', () => {
      runSearch('https://search.brave.com/search?q=');
    });

    searchForm.addEventListener('submit', (event) => {
      event.preventDefault();
      runSearch('https://gregle.de/search?q=');
    });

    searchInput.addEventListener('input', () => {
      activeSuggestionIndex = -1;
      if (searchInput.value.trim().length >= 1) {
        queueSuggestions();
      } else {
        closeAutocomplete();
      }
    });

    searchInput.addEventListener('focus', () => {
      if (searchInput.value.trim().length >= 1) {
        queueSuggestions();
      }
    });

    searchInput.addEventListener('keydown', (event) => {
      if (!autocompleteList.classList.contains('open') || !suggestionItems.length) return;

      if (event.key === 'ArrowDown') {
        event.preventDefault();
        activeSuggestionIndex = (activeSuggestionIndex + 1) % suggestionItems.length;
        renderSuggestionList(suggestionItems);
      } else if (event.key === 'ArrowUp') {
        event.preventDefault();
        activeSuggestionIndex = (activeSuggestionIndex - 1 + suggestionItems.length) % suggestionItems.length;
        renderSuggestionList(suggestionItems);
      } else if (event.key === 'Enter' && activeSuggestionIndex >= 0) {
        event.preventDefault();
        searchInput.value = suggestionItems[activeSuggestionIndex];
        closeAutocomplete();
        searchForm.requestSubmit();
      } else if (event.key === 'Escape') {
        closeAutocomplete();
      }
    });

    document.addEventListener('click', (event) => {
      if (!searchForm.contains(event.target)) {
        closeAutocomplete();
      }
    });

    function updateUTCClock() {
      const now = new Date();
      const time = now.toLocaleTimeString('en-GB', {
        timeZone: 'UTC',
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      });
      utcClock.innerHTML = `<strong>UTC</strong>&nbsp; ${time}`;
    }

    initTheme();


    updateUTCClock();
    setInterval(updateUTCClock, 30000);


    brandToggle.addEventListener('click', () => {
      const nextTheme = document.body.classList.contains('dark-mode') ? 'light' : 'dark';
      applyTheme(nextTheme);
    });

    menuToggle.addEventListener('click', () => {
      const open = menuPanel.classList.toggle('open');
      menuToggle.setAttribute('aria-expanded', String(open));
    });

    document.addEventListener('click', (event) => {
      if (!menuPanel.contains(event.target) && !menuToggle.contains(event.target)) {
        menuPanel.classList.remove('open');
        menuToggle.setAttribute('aria-expanded', 'false');
      }
    });

    const DEFAULT_WEATHER_LOCATION = {
      name: '',
      latitude: 48.4284,
      longitude: -123.3656
    };
    const WEATHER_CACHE_KEY = 'gregle-weather-cache';
    const WEATHER_CACHE_MAX_AGE = 30 * 60 * 1000;

    async function fetchWeather(lat, lon, retries = 1) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 8000);
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&temperature_unit=celsius&timezone=auto`;

      try {
        const response = await fetch(url, {
          signal: controller.signal,
          cache: 'no-store'
        });
        if (!response.ok) throw new Error('Weather request failed');
        return response.json();
      } catch (error) {
        if (retries > 0) {
          return fetchWeather(lat, lon, retries - 1);
        }
        throw error;
      } finally {
        clearTimeout(timeoutId);
      }
    }

    function weatherIcon(code) {
      if (code === 0) return '☀';
      if ([1, 2].includes(code)) return '⛅';
      if ([3, 45, 48].includes(code)) return '☁';
      if ([51, 53, 55, 61, 63, 65, 80, 81, 82].includes(code)) return '🌧';
      if ([71, 73, 75].includes(code)) return '❄';
      if (code === 95) return '⛈';
      return '☁';
    }

    function setWeatherChip(temp, code, lat, lon, label = '') {
      const prefix = '';
      weatherChip.innerHTML = `<strong>${weatherIcon(code)}</strong>&nbsp; ${prefix}${Math.round(temp)}°C`;
      weatherChip.href = `https://www.windy.com/${lat}/${lon}`;
    }

    function setWeatherFallback() {
      weatherChip.innerHTML = '<strong>☁</strong>&nbsp; --°C';
      weatherChip.href = `https://www.windy.com/${DEFAULT_WEATHER_LOCATION.latitude}/${DEFAULT_WEATHER_LOCATION.longitude}`;
    }

    function readCachedWeather() {
      try {
        const cached = JSON.parse(localStorage.getItem(WEATHER_CACHE_KEY) || 'null');
        if (!cached || !cached.savedAt) return null;
        if (Date.now() - cached.savedAt > WEATHER_CACHE_MAX_AGE) return null;
        return cached;
      } catch {
        return null;
      }
    }

    function writeCachedWeather(payload) {
      try {
        localStorage.setItem(WEATHER_CACHE_KEY, JSON.stringify({
          ...payload,
          savedAt: Date.now()
        }));
      } catch {}
    }

    function getCurrentPosition(options) {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) {
          reject(new Error('Geolocation unavailable'));
          return;
        }
        navigator.geolocation.getCurrentPosition(resolve, reject, options);
      });
    }

    async function loadWeatherForLocation(location, label = '') {
      const data = await fetchWeather(location.latitude, location.longitude);
      const current = data.current;
      setWeatherChip(current.temperature_2m, current.weather_code, location.latitude, location.longitude, label);
      writeCachedWeather({
        temperature: current.temperature_2m,
        weatherCode: current.weather_code,
        latitude: location.latitude,
        longitude: location.longitude,
        label
      });
    }

    async function loadWeather() {
      const cached = readCachedWeather();
      if (cached) {
        setWeatherChip(cached.temperature, cached.weatherCode, cached.latitude, cached.longitude, cached.label || '');
      } else {
        setWeatherFallback();
      }

      try {
        const { coords } = await getCurrentPosition({ timeout: 10000, maximumAge: 900000, enableHighAccuracy: false });
        await loadWeatherForLocation({ latitude: coords.latitude, longitude: coords.longitude });
        return;
      } catch {}

      if (cached) {
        return;
      }

      try {
        await loadWeatherForLocation(DEFAULT_WEATHER_LOCATION, '');
      } catch {
        setWeatherFallback();
      }
    }

    let tickerPaused = false;
    let tickerOffset = 0;
    let tickerSpeed = 0.12;
    let tickerGroupWidth = 0;
    let animationFrameId = null;
    let lastTimestamp = 0;

    function makeTickerMarkup(items) {
      return items.map(item => {
        const href = item.link || '#';
        const title = item.title || '';
        return `
          <a class="ticker-item" href="${href}" target="_blank" rel="noreferrer">${title}</a>
          <span class="ticker-sep" aria-hidden="true">•</span>
        `;
      }).join('');
    }

    function startTicker() {
      const primaryGroup = document.getElementById('tickerGroup');
      if (!primaryGroup) return;

      const cloneGroup = primaryGroup.nextElementSibling;
      tickerGroupWidth = primaryGroup.scrollWidth;

      if (cloneGroup) {
        cloneGroup.style.marginLeft = '0px';
      }

      tickerOffset = 0;
      lastTimestamp = 0;

      if (animationFrameId) {
        cancelAnimationFrame(animationFrameId);
      }

      function step(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const delta = timestamp - lastTimestamp;
        lastTimestamp = timestamp;

        if (!tickerPaused && tickerGroupWidth > 0) {
          tickerOffset -= tickerSpeed * delta;
          if (Math.abs(tickerOffset) >= tickerGroupWidth) {
            tickerOffset += tickerGroupWidth;
          }
          tickerTrack.style.transform = `translateX(${tickerOffset}px)`;
        }

        animationFrameId = requestAnimationFrame(step);
      }

      animationFrameId = requestAnimationFrame(step);
    }

    function bindTickerPause() {
      const ticker = document.querySelector('.ticker');
      if (!ticker) return;

      ticker.addEventListener('mouseenter', () => {
        tickerPaused = true;
      });

      ticker.addEventListener('mouseleave', () => {
        tickerPaused = false;
      });

      ticker.addEventListener('focusin', () => {
        tickerPaused = true;
      });

      ticker.addEventListener('focusout', () => {
        tickerPaused = false;
      });
    }

    async function loadBBCNews() {
      try {
        const response = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://feeds.bbci.co.uk/news/rss.xml');
        if (!response.ok) throw new Error('Ticker request failed');
        const data = await response.json();

        const headlines = (data.items || []).slice(0, 10);
        if (!headlines.length) throw new Error('No headlines found');

        const markup = makeTickerMarkup(headlines);
        tickerTrack.innerHTML = `
          <div class="ticker-group" id="tickerGroup">${markup}</div>
          <div class="ticker-group" aria-hidden="true">${markup}</div>
        `;
      } catch {
        const fallbackItems = [
          { link: 'https://www.bbc.com/news', title: 'Open BBC News' },
          { link: 'https://www.bbc.com/news', title: 'Live headlines unavailable' }
        ];
        const markup = makeTickerMarkup(fallbackItems);
        tickerTrack.innerHTML = `
          <div class="ticker-group" id="tickerGroup">${markup}</div>
          <div class="ticker-group" aria-hidden="true">${markup}</div>
        `;
      }

      bindTickerPause();
      startTicker();
      window.addEventListener('resize', startTicker);
    }

    loadWeather();
    setInterval(loadWeather, 15 * 60 * 1000);
    loadBBCNews();
    searchInput.focus();
  </script>
