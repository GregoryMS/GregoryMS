name: Update weather

on:
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  weather:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Environment Canada forecast
        run: |
          python3 <<'PY'
          import urllib.request, xml.etree.ElementTree as ET, json

          url = "https://weather.gc.ca/rss/city/bc-85_e.xml"
          xml = urllib.request.urlopen(url).read()
          root = ET.fromstring(xml)

          ns = {"a": "http://www.w3.org/2005/Atom"}
          items = []

          for entry in root.findall("a:entry", ns)[:8]:
              title = entry.findtext("a:title", default="", namespaces=ns)
              summary = entry.findtext("a:summary", default="", namespaces=ns)
              items.append({"title": title, "summary": summary})

          with open("weather.json", "w") as f:
              json.dump(items, f, indent=2)
          PY

      - name: Commit updated forecast
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add weather.json
          git commit -m "Update weather" || exit 0
          git push
