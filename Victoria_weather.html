<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Victoria Weather</title>
</head>
<body>
  <h1>Victoria, BC Forecast</h1>
  <p>Environment Canada</p>
  <div id="forecast">Loading...</div>

  <script>
    fetch("./weather.json?cache=" + Date.now())
      .then(response => {
        if (!response.ok) throw new Error("weather.json not found");
        return response.json();
      })
      .then(data => {
        document.getElementById("forecast").innerHTML = data.map(item => `
          <div style="border-top:1px solid #ddd;padding:12px 0">
            <h2>${item.title}</h2>
            <p>${item.summary}</p>
          </div>
        `).join("");
      })
      .catch(error => {
        document.getElementById("forecast").innerHTML =
          "Could not load weather.json. Check that weather.json exists in the same folder as index.html.";
        console.error(error);
      });
  </script>
</body>
</html>
